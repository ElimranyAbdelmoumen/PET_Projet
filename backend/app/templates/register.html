<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Register - PET</title>
  <style>
    body{font-family:Arial; margin:40px;}
    .box{max-width:420px; padding:20px; border:1px solid #ddd; border-radius:10px;}
    input,button{width:100%; padding:10px; margin:8px 0;}
    .err{color:#b00020;}
  </style>
</head>
<body>
  <div class="box">
    <h2>Créer un compte</h2>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    <form method="post" action="/web/register">
      <input name="username" placeholder="Username" required />
      <input name="password" placeholder="Mot de passe" type="password" required />
      <button type="submit">Créer</button>
    </form>
    <a href="/web/login">Retour login</a>
  </div>
</body>
</html>
