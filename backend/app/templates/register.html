<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Register - PET</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Créer un compte</h2>
      {% if error %}<p class="flash error">{{ error }}</p>{% endif %}
      <form method="post" action="/web/register">
        <label for="username">Username</label>
        <input id="username" name="username" placeholder="Username" required />

        <label for="password">Mot de passe</label>
        <input id="password" name="password" placeholder="Mot de passe" type="password" required />

        <button type="submit">Créer</button>
      </form>
      <p class="hint">
        <a href="/web/login">Retour login</a>
      </p>
    </div>
  </div>
</body>
</html>
