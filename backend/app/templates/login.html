<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Login - PET</title>
  <style>
    body{font-family:Arial; margin:40px;}
    .box{max-width:420px; padding:20px; border:1px solid #ddd; border-radius:10px;}
    input,textarea,button{width:100%; padding:10px; margin:8px 0;}
    .err{color:#b00020;}
    .row{display:flex; gap:10px;}
    .row a{font-size:14px;}
  </style>
</head>
<body>
  <div class="box">
    <h2>Connexion</h2>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    <form method="post" action="/web/login">
      <input name="username" placeholder="Username" required />
      <input name="password" placeholder="Mot de passe" type="password" required />
      <button type="submit">Se connecter</button>
    </form>

    <div class="row">
      <a href="/web/register">Créer un compte</a>
    </div>
  </div>
</body>
</html>
