<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Submit - PET</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="topbar">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
      <div class="brand">PET Platform — Soumission</div>
      <form method="post" action="/web/logout" class="inline">
        <span>Connecté : <b>{{ username }}</b></span>
        <button type="submit">Logout</button>
      </form>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2>Soumission de code</h2>

      <div class="flash-zone">
        {% if error %}<p class="flash error">{{ error }}</p>{% endif %}
        {% if result %}
          <p class="flash success">Soumission créée : ID {{ result.id }} ({{ result.status }})</p>
        {% endif %}
      </div>

      <form method="post" action="/web/submit">
        <label for="code">Script Python</label>
        <textarea id="code" name="code" placeholder="Collez votre script Python ici..." required>print("Hello PET Platform")</textarea>
        <button type="submit">Soumettre (PENDING)</button>
      </form>
    </div>
  </div>
</body>
</html>
